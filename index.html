<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>RNG GAME</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #07070e;
      --panel-bg:   #0b0b16;
      --card-bg:    #0e0e1c;
      --border:     #1a1a2e;
      --border-lit: #2a2a44;
      --text:       #c8c8dc;
      --muted:      #4a4a68;
      --gold:       #c8921a;
      --gold-light: #e8b84b;
      --gold-glow:  #c8921a66;
      --teal:       #00d4b4;
      --font-title: 'Cinzel', serif;
      --font-ui:    'Rajdhani', sans-serif;
    }

    html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--font-ui); }

    #starfield { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    #app {
      position: relative; z-index: 1; height: 100vh;
      display: grid;
      grid-template-rows: 70px 1fr;
    }

    /* ── Header ──────────────────────────────────────────────────────── */
    header {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 2px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(11,11,22,.98) 0%, rgba(7,7,14,.7) 100%);
    }
    .header-logo {
      font-family: var(--font-title);
      font-size: 1.9rem; font-weight: 900; letter-spacing: .18em; line-height: 1;
    }
    .logo-rng  { color: var(--gold-light); text-shadow: 0 0 20px var(--gold-glow), 0 0 40px var(--gold-glow); }
    .logo-game { color: #fff; }
    .header-tagline { font-size: .58rem; letter-spacing: .4em; text-transform: uppercase; color: var(--muted); }

    /* ── 3-column layout ─────────────────────────────────────────────── */
    .layout {
      display: grid;
      grid-template-columns: 200px 1fr 300px;
      overflow: hidden;
    }

    /* ── LEFT STATS PANEL ────────────────────────────────────────────── */
    .stats-panel {
      background: var(--panel-bg);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .stats-panel-inner {
      flex: 1; overflow-y: auto; padding: 14px 0 8px;
      scrollbar-width: thin; scrollbar-color: var(--border) transparent;
    }
    .panel-section-label {
      font-size: .6rem; letter-spacing: .25em; text-transform: uppercase;
      color: var(--muted); padding: 0 14px 6px;
    }
    .stat-total-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 4px 14px 10px;
      border-bottom: 1px solid var(--border); margin-bottom: 4px;
    }
    .stat-total-row span:first-child { font-size: .78rem; color: var(--muted); letter-spacing: .05em; }
    .stat-total-row span:last-child  { font-size: 1.05rem; font-weight: 700; color: #fff; }

    .luck-section { padding: 6px 14px 10px; border-bottom: 1px solid var(--border); margin-bottom: 4px; }
    .luck-row { display: flex; align-items: center; gap: 8px; }
    .luck-label { font-size: .7rem; color: var(--muted); letter-spacing: .06em; min-width: 30px; }
    .luck-bar { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .luck-bar-fill {
      height: 100%; border-radius: 2px; width: 0%;
      background: linear-gradient(90deg, var(--gold), var(--gold-light));
      transition: width .4s ease;
    }
    #luck-bar-label { font-size: .72rem; font-weight: 600; color: var(--gold-light); min-width: 38px; text-align: right; }

    #active-crafts { padding: 0 14px; }
    .active-boost  { padding: 6px 0 8px; border-bottom: 1px solid var(--border); }
    .boost-row     { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
    .boost-name    { font-size: .72rem; flex: 1; color: var(--text); }
    .boost-mult    { font-size: .72rem; font-weight: 700; color: var(--gold-light); }
    .boost-rolls   { font-size: .62rem; color: var(--muted); }
    .boost-bar     { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .boost-bar-fill { height: 100%; background: var(--gold); border-radius: 2px; }

    .stat-row { display: flex; align-items: center; gap: 8px; padding: 4px 14px; font-size: .78rem; }
    .stat-icon  { font-size: .7rem; flex-shrink: 0; width: 14px; text-align: center; }
    .stat-name  { flex: 1; font-weight: 500; }
    .stat-count { font-weight: 700; color: #fff; font-size: .82rem; }
    .stat-empty { padding: 10px 14px; font-size: .72rem; color: var(--muted); font-style: italic; }

    .pity-row   { padding: 2px 14px; }
    .pity-label { font-size: .7rem; flex: 1; }
    .pity-count { font-size: .75rem; }

    /* ── CENTER STAGE ────────────────────────────────────────────────── */
    .stage {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 22px; padding: 16px 24px; overflow: hidden;
    }

    /* Result card */
    .result-card {
      width: min(440px, 100%);
      background: var(--card-bg);
      border: 1px solid var(--border-lit);
      border-radius: 16px;
      padding: 22px 24px 18px;
      display: flex; align-items: center; gap: 18px;
      box-shadow: 0 0 40px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.03);
      position: relative; overflow: hidden;
    }
    .result-card::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(255,255,255,.025) 0%, transparent 65%);
      pointer-events: none;
    }
    .card-canvas-wrap {
      flex-shrink: 0; width: 80px; height: 80px; border-radius: 50%;
      background: radial-gradient(circle, #0c0c20 0%, #060610 100%);
      border: 1px solid var(--border); overflow: hidden;
    }
    #aura-canvas { display: block; }

    .card-content { flex: 1; display: flex; flex-direction: column; gap: 3px; min-width: 0; }
    .card-top     { display: flex; align-items: center; gap: 10px; margin-bottom: 5px; }

    #card-icon {
      font-size: 1.6rem; line-height: 1;
      filter: drop-shadow(0 0 8px currentColor);
      transition: color .4s, filter .4s;
    }
    #card-rarity-label {
      font-size: .7rem; font-weight: 700; letter-spacing: .25em; text-transform: uppercase;
      color: var(--muted); transition: color .4s;
    }
    #card-aura-name {
      font-family: var(--font-title); font-size: 1.3rem; font-weight: 600;
      color: #fff; letter-spacing: .04em; line-height: 1.2;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    #card-subtitle { font-size: .78rem; font-style: italic; color: var(--muted); margin-top: 1px; }
    #card-badge {
      display: inline-block; margin-top: 8px;
      font-size: .6rem; font-weight: 700; letter-spacing: .2em; text-transform: uppercase;
      padding: 3px 12px; border-radius: 20px;
      border: 1px solid var(--border-lit); color: var(--muted);
      background: rgba(255,255,255,.03); transition: all .4s;
    }

    /* ── Roll button ─────────────────────────────────────────────────── */
    .roll-btn {
      width: 140px; height: 140px; border-radius: 50%;
      border: none; cursor: pointer;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 4px;
      position: relative; z-index: 0;
      background: radial-gradient(circle at 40% 35%, #1e1608 0%, #0a0808 100%);
      transition: transform .12s, box-shadow .2s;
    }
    .roll-btn::before {
      content: '';
      position: absolute; inset: -4px; border-radius: 50%; z-index: -1;
      background: conic-gradient(
        var(--gold-light) 0deg,
        var(--gold)       90deg,
        #3a2400           180deg,
        var(--gold)       270deg,
        var(--gold-light) 360deg
      );
      animation: ring-spin 3.5s linear infinite;
    }
    .roll-btn::after {
      content: '';
      position: absolute; inset: 4px; border-radius: 50%; z-index: -1;
      background: radial-gradient(circle at 40% 35%, #1c1408 0%, #080710 100%);
    }
    @keyframes ring-spin { to { transform: rotate(360deg); } }
    .roll-btn.rolling::before { animation-duration: .5s; }
    .roll-btn:hover:not(:disabled) { transform: scale(1.05); box-shadow: 0 0 40px var(--gold-glow), 0 0 80px rgba(200,146,26,.2); }
    .roll-btn:active:not(:disabled) { transform: scale(.97); }
    .roll-btn:disabled { opacity: .55; cursor: not-allowed; }
    .roll-btn.rolling { animation: roll-pulse .7s ease-in-out infinite; }
    @keyframes roll-pulse {
      0%, 100% { box-shadow: 0 0 20px var(--gold-glow); }
      50%       { box-shadow: 0 0 55px var(--gold), 0 0 90px var(--gold-glow); }
    }
    .roll-btn-text {
      font-family: var(--font-title); font-size: 1.4rem; font-weight: 900;
      letter-spacing: .22em; color: var(--gold-light);
      text-shadow: 0 0 16px var(--gold-glow); line-height: 1;
    }
    .roll-btn-sub {
      font-size: .58rem; letter-spacing: .12em; text-transform: lowercase; color: var(--muted);
    }

    /* Auto roll */
    #auto-roll-btn {
      background: transparent; border: 1px solid var(--border-lit); color: var(--muted);
      font-family: var(--font-ui); font-size: .68rem; font-weight: 700;
      letter-spacing: .2em; text-transform: uppercase;
      padding: 8px 24px; border-radius: 20px; cursor: pointer;
      transition: color .15s, border-color .15s, background .15s;
    }
    #auto-roll-btn:hover { color: var(--text); border-color: var(--muted); }
    #auto-roll-btn.active { color: #ff5252; border-color: #ff525255; background: #ff525210; }

    /* ── RIGHT PANEL ─────────────────────────────────────────────────── */
    .right-panel {
      background: var(--panel-bg); border-left: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .right-tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .right-tab-btn {
      flex: 1; background: none; border: none; color: var(--muted);
      font-family: var(--font-ui); font-size: .67rem; font-weight: 700;
      letter-spacing: .14em; text-transform: uppercase;
      padding: 12px 6px; border-bottom: 2px solid transparent; cursor: pointer;
      transition: color .15s, border-color .15s;
    }
    .right-tab-btn:hover { color: var(--text); }
    .right-tab-btn.active { color: var(--teal); border-bottom-color: var(--teal); }

    .right-pane {
      flex: 1; overflow-y: auto; padding: 12px 14px;
      scrollbar-width: thin; scrollbar-color: var(--border) transparent;
      flex-direction: column; gap: 0;
    }
    .synergy-header {
      font-size: .62rem; letter-spacing: .28em; text-transform: uppercase;
      color: var(--gold); padding-bottom: 8px;
      border-bottom: 1px solid var(--border); margin-bottom: 10px;
    }

    /* Recipe cards */
    .recipe-card {
      background: rgba(255,255,255,.02); border: 1px solid var(--border);
      border-radius: 8px; padding: 11px 12px 9px; margin-bottom: 8px;
      transition: border-color .15s;
    }
    .recipe-card.craftable:hover { border-color: rgba(0,212,180,.3); }
    .recipe-header { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 8px; }
    .recipe-icon   { font-size: 1.05rem; line-height: 1; flex-shrink: 0; margin-top: 1px; }
    .recipe-title-group { flex: 1; min-width: 0; }
    .recipe-name   { font-size: .82rem; font-weight: 700; color: #fff; letter-spacing: .04em; display: block; margin-bottom: 2px; }
    .recipe-desc   { font-size: .67rem; color: var(--muted); line-height: 1.4; display: block; }
    .recipe-meta   { display: flex; flex-direction: column; align-items: flex-end; gap: 1px; flex-shrink: 0; }
    .recipe-mult   { font-size: .85rem; font-weight: 900; color: var(--gold-light); letter-spacing: .04em; }
    .recipe-dur    { font-size: .6rem; color: var(--muted); letter-spacing: .04em; white-space: nowrap; }
    .recipe-footer { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .recipe-ings   { display: flex; align-items: center; gap: 4px; flex: 1; flex-wrap: wrap; }

    .ing-badge {
      display: inline-flex; align-items: center; gap: 2px;
      font-size: .65rem; font-weight: 600;
      padding: 2px 7px; border-radius: 10px;
      border: 1px solid var(--ic, #444);
      background: color-mix(in srgb, var(--ic, #444) 12%, transparent);
      color: var(--ic, #888); white-space: nowrap;
    }
    .ing-badge.ing-bad { color: #ff525299; border-color: #ff525244; background: #ff525210; }
    .ing-have { font-weight: 700; }
    .ing-sep  { opacity: .5; margin: 0 1px; }
    .ing-plus { color: var(--muted); font-size: .7rem; flex-shrink: 0; padding: 0 1px; }

    .craft-btn {
      font-family: var(--font-ui); font-size: .64rem; font-weight: 700;
      letter-spacing: .15em; text-transform: uppercase;
      padding: 5px 11px; border-radius: 4px; cursor: pointer;
      border: 1px solid var(--teal); color: var(--teal);
      background: rgba(0,212,180,.08);
      transition: background .15s, box-shadow .15s; white-space: nowrap; flex-shrink: 0;
    }
    .craft-btn:hover { background: rgba(0,212,180,.18); box-shadow: 0 0 10px rgba(0,212,180,.25); }
    .craft-disabled  {
      color: var(--muted) !important; border-color: var(--border-lit) !important;
      background: transparent !important; cursor: not-allowed !important;
    }

    /* Collection */
    .coll-section { margin-bottom: 12px; }
    .coll-rarity-header {
      font-size: .7rem; font-weight: 700; letter-spacing: .12em; text-transform: uppercase;
      padding: 4px 0 6px; border-bottom: 1px solid var(--border); margin-bottom: 4px;
    }
    .coll-count { font-weight: 400; color: var(--muted); margin-left: 4px; }
    .coll-auras { display: flex; flex-direction: column; gap: 2px; }
    .coll-item {
      display: flex; justify-content: space-between; font-size: .76rem;
      padding: 3px 6px; border-radius: 4px; transition: background .12s;
    }
    .coll-item:hover { background: rgba(255,255,255,.03); }
    .coll-item-count { font-weight: 700; color: var(--rc, #888); }

    /* Scrollbars */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-lit); border-radius: 2px; }

    @media (max-width: 800px) {
      .layout { grid-template-columns: 0 1fr 0; }
      .stats-panel, .right-panel { display: none; }
    }
  </style>
</head>
<body>
<canvas id="starfield"></canvas>

<div id="app">
  <header>
    <div class="header-logo">
      <span class="logo-rng">RNG</span><span class="logo-game">GAME</span>
    </div>
    <div class="header-tagline">Summon Your Fate</div>
  </header>

  <div class="layout">

    <!-- ── LEFT ────────────────────────────────────── -->
    <aside class="stats-panel">
      <div class="stats-panel-inner">
        <div class="panel-section-label">Your Stats</div>

        <div class="stat-total-row">
          <span>Total Rolls</span>
          <span id="total-rolls">0</span>
        </div>

        <div class="luck-section">
          <div class="luck-row">
            <span class="luck-label">Luck</span>
            <div class="luck-bar">
              <div class="luck-bar-fill" id="luck-bar-fill"></div>
            </div>
            <span id="luck-bar-label">×1.00</span>
          </div>
        </div>

        <div id="active-crafts"></div>
        <div id="aura-counts"><div class="stat-empty">No auras yet</div></div>
        <div id="pity-counts"></div>
      </div>
    </aside>

    <!-- ── CENTER ───────────────────────────────────── -->
    <main class="stage">

      <div class="result-card">
        <div class="card-canvas-wrap">
          <canvas id="aura-canvas" width="80" height="80"></canvas>
        </div>
        <div class="card-content">
          <div class="card-top">
            <span id="card-icon">◆</span>
            <span id="card-rarity-label">—</span>
          </div>
          <div id="card-aura-name">Roll to begin</div>
          <div id="card-subtitle">Your fate awaits...</div>
          <div id="card-badge">—</div>
        </div>
      </div>

      <button id="roll-btn" class="roll-btn">
        <span class="roll-btn-text">ROLL</span>
        <span class="roll-btn-sub">tap to summon fate</span>
      </button>

      <button id="auto-roll-btn">AUTO ROLL</button>

    </main>

    <!-- ── RIGHT ────────────────────────────────────── -->
    <aside class="right-panel">
      <div class="right-tabs">
        <button class="right-tab-btn" data-tab="collection">✦ COLLECTION</button>
        <button class="right-tab-btn active" data-tab="craft">🔧 CRAFT</button>
      </div>

      <div class="right-pane" data-pane="collection" style="display:none">
        <div id="collection-list">
          <div class="stat-empty">Roll to discover auras.</div>
        </div>
      </div>

      <div class="right-pane" data-pane="craft" style="display:flex">
        <div class="synergy-header">✦ Synergy</div>
        <div id="craft-list"></div>
      </div>
    </aside>

  </div>
</div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
